{{- /*
  Skill governance pattern ConfigMap.
  Mounted read-only at /etc/mcp-governance/skill-patterns in the controller.
  Each key is a category of security patterns used by the skillscanner package.
  Operators can override individual keys without touching the others.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-governance-skill-patterns
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp-governance.labels" . | nindent 4 }}
    app.kubernetes.io/component: skill-governance
data:
  # SKL-SEC-001: Prompt injection patterns (one per line; lines starting with # are comments)
  prompt-injection: |
    # Patterns that indicate prompt injection attempts
    ignore previous instructions
    ignore all previous
    disregard your instructions
    forget your previous instructions
    your new instructions are
    override your system prompt
    new system prompt
    ignore the above
    do not follow
    bypass safety
    jailbreak
    DAN mode
    developer mode enabled
    pretend you are
    act as if you have no restrictions
    simulate being

  # SKL-SEC-002: Privilege escalation language
  privilege-escalation: |
    sudo
    run as root
    escalate privileges
    become administrator
    gain elevated access
    bypass authentication
    disable security
    setuid
    chmod 777
    chmod +s
    privilege escalation
    run with elevated
    execute as administrator
    administrator privileges

  # SKL-SEC-003: Data exfiltration patterns
  data-exfiltration: |
    exfiltrate
    send data to external
    upload to external
    transmit to remote
    leak data
    send credentials
    forward secrets
    export sensitive
    copy to external storage
    transfer to third party
    webhook.site
    requestbin
    burpcollaborator
    oastify.com
    pipedream.net

  # SKL-SEC-004: Credential harvesting patterns
  credential-harvesting: |
    steal credentials
    harvest passwords
    capture tokens
    extract api keys
    collect secrets
    phishing
    credential stuffing
    brute force password
    enumerate users
    dump credentials
    keylogger
    password spraying
    capture authentication

  # SKL-SEC-005: Scope creep rules
  # Format: category: forbidden keyword1, keyword2, ...
  scope-creep: |
    data: deploy, provision infrastructure, create cluster, manage kubernetes
    analytics: delete database, drop table, truncate, delete all records
    communication: execute code, run shell, bash -c, system command
    productivity: access production, modify live data, delete records, admin console

  # SKL-SEC-006: Safety guardrail requirements
  # Format: category: required phrase1, required phrase2, ...
  # At least ONE phrase must be present in the skill file
  safety-guardrails: |
    database: confirmation required, dry run, requires approval, cannot be undone, irreversible, backup recommended
    infra: confirmation required, requires approval, change management, review before applying, dry run
    admin: admin access required, requires elevated privileges, audit logged, requires approval, multi-factor
